# Blueprint do Render. Liga o teu repositório GitHub e o Render lê este ficheiro.
#
# NOTA SOBRE A BASE DE DADOS:
# Este blueprint NÃO cria uma base de dados (para nunca criar uma paga sem querer).
# Cria só a app web no plano FREE. A ligação à base de dados é feita pela variável
# DATABASE_URL, que preenches tu com:
#   - uma base de dados grátis e permanente do Neon (neon.com), recomendado; ou
#   - um Postgres "Free" criado à mão no Render (apaga ao fim de 30 dias).

services:
  - type: web
    name: sara-maia-pastry
    runtime: node
    plan: free                 # plano gratuito (adormece após 15 min de inatividade)
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false            # cola aqui a connection string da tua base de dados grátis
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VENDUS_API_KEY
        sync: false
      - key: VENDUS_REGISTER_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_OWNER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true    # o Render gera uma chave segura sozinho
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
