# Blueprint do Render. Liga o teu repositório GitHub e o Render lê este ficheiro.
# Cria a app web + a base de dados, ambas no plano FREE (gratuito).
#
# IMPORTANTE sobre a base de dados Free do Render:
#   - Cada conta só pode ter UMA base de dados Postgres Free de cada vez.
#     Se já tens uma base de dados criada (ex.: a Basic anterior), APAGA-A primeiro,
#     senão a sincronização do blueprint dá erro.
#   - A base de dados Free é apagada ~30 dias após criação (recria e corre o seed de novo).

services:
  - type: web
    name: sara-maia-pastry
    runtime: node
    plan: free                 # app web gratuita (adormece após 15 min de inatividade)
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sara-maia-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VENDUS_API_KEY
        sync: false
      - key: VENDUS_REGISTER_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_OWNER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true    # o Render gera uma chave segura sozinho
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: MYMEMORY_EMAIL
        sync: false

databases:
  - name: sara-maia-db
    plan: free                 # base de dados Postgres GRATUITA (expira aos 30 dias)
    databaseName: saramaia
